<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Insert title here</title>
    <style>
      .button {
        font-size: 1rem;
        text-decoration: none;
        display: block;
        margin: 0 auto;
        padding: 0.4rem 1rem;
        border: 1px solid #8c634f;
        border-radius: 0.3rem;
        background: #a38272;
        color: white;
        transition: background 0.3s ease;
      }
      .button:hover {
        background: #b49181;
        border-color: #8c634f;
      }
      .button:active {
        background: #8c634f;
      }
    </style>
  </head>
  <body>
    <br />
    <br />
    <a href="http://www.uinio.com" target="_top" class="button">
      <div>返回 UinIO.com</div>
      <div>电子技术实验室</div>
    </a>
  </body>
</html>
